name: Keep Supabase Alive

on:
  schedule:
    - cron: '0 9 * * 1,4'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase Health Check
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        run: |
          curl --fail --silent --show-error \
            "$SUPABASE_URL/rest/v1/"