name: Keep Supabase Alive

on:
  schedule:
    - cron: '0 9 * * 1,4'  # Montag und Donnerstag, 09:00 UTC
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install @supabase/supabase-js ws

      - name: Ping Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
        run: |
          node -e "
          const { createClient } = require('@supabase/supabase-js');
          const ws = require('ws');
          const supabase = createClient(
            process.env.SUPABASE_URL,
            process.env.SUPABASE_KEY,
            { realtime: { params: { transport: ws } } }
          );

          const timeout = new Promise((_, reject) =>
            setTimeout(() => reject(new Error('Timeout after 30s')), 30000)
          );

          const ping = supabase
            .from('recipes')
            .select('id')
            .limit(1)
            .then(({ error }) => {
              if (error) {
                console.error('Ping failed:', error.message);
                process.exit(1);
              }
              console.log('Ping successful - Supabase is alive!');
            });

          Promise.race([ping, timeout]);
          "
